
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex flex-col gap-4 lg:flex-row lg:justify-between lg:items-center">

      
      <div class="flex items-center gap-3 min-w-0">
        <img
          src="/assets/github-logo.png"
          alt="GitHub Logo"
          class="w-8 h-8 object-contain shrink-0"
        />
        <h1 class="text-lg sm:text-xl font-bold text-gray-800 truncate">
          GitHub Issues Tracker
        </h1>
      </div>

     
      <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
        <input
          id="searchInput"
          type="search"
          placeholder="Search issues..."
          class="border px-3 py-2 rounded w-full sm:flex-1 lg:w-64 text-sm outline-none focus:ring-2 focus:ring-blue-500"
        />

        <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm w-full sm:w-auto whitespace-nowrap">
          + New Issue
        </button>
      </div>

    </div>
  </header>

  <section class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
    <div class="bg-white rounded-xl shadow overflow-hidden">

    
      <div class="flex flex-wrap gap-3 border-b p-4">
        <button
          id="allTab"
          class="tab-btn px-4 py-2 rounded bg-purple-600 text-white text-sm sm:text-base"
        >
          All
        </button>

        <button
          id="openTab"
          class="tab-btn px-4 py-2 rounded border text-sm sm:text-base"
        >
          Open
        </button>

        <button
          id="closedTab"
          class="tab-btn px-4 py-2 rounded border text-sm sm:text-base"
        >
          Closed
        </button>
      </div>

      
      <div class="px-4 sm:px-6 py-4 flex flex-col gap-4 lg:flex-row lg:justify-between lg:items-center">

        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 min-w-0">
          <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-purple-500 rounded-full shrink-0"></div>
            <span id="issueCount" class="font-semibold">0 Issues</span>
          </div>

          <span class="text-gray-500 text-sm break-words">
            Track and manage your project issues
          </span>
        </div>

        <div class="flex flex-wrap gap-4 text-sm">
          <span class="flex items-center gap-1">
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            Open
          </span>

          <span class="flex items-center gap-1">
            <div class="w-2 h-2 bg-purple-500 rounded-full"></div>
            Closed
          </span>
        </div>

      </div>

    </div>
  </section>

 
  <div id="loader" class="hidden flex justify-center py-6">
    <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
  </div>

  
  <section class="max-w-6xl mx-auto px-4 sm:px-6 pb-10">
    <div
      id="issuesContainer"
      class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 sm:gap-6"
    ></div>
  </section>

  
  <div
    id="modal"
    class="hidden fixed inset-0 z-50 bg-black/40 p-4 flex items-center justify-center"
  >
    <div class="bg-white p-5 sm:p-6 rounded-lg w-full max-w-md max-h-[90vh] overflow-y-auto">
      <h2 id="modalTitle" class="text-lg sm:text-xl font-bold mb-2 break-words"></h2>
      <div id="modalDesc" class="text-sm text-gray-600 mb-4"></div>

      <button
        onclick="closeModal()"
        class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded w-full sm:w-auto"
      >
        Close
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
