


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-md bg-white rounded-xl shadow-md border border-gray-200 p-8">

    <div class="text-center mb-6">
      <img
        src="/assets/github-logo.png"
        alt="GitHub Logo"
        class="w-24 h-24 mx-auto mb-5 object-contain"
      />

      <h1 class="text-[20px] font-bold text-gray-800 mb-1">
        GitHub Issues Tracker
      </h1>

      <p class="text-gray-500 text-sm">
        Sign in to manage your issues
      </p>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-4">
        <label for="username" class="block text-sm font-semibold text-gray-800 mb-2">
          Username
        </label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="off"
          class="w-full h-11 px-4 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
          required
        />
      </div>

      <div class="mb-4">
        <label for="password" class="block text-sm font-semibold text-gray-800 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="new-password"
          class="w-full h-11 px-4 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
          required
        />
      </div>

      <button
        type="submit"
        id="loginBtn"
        class="w-full h-11 rounded-md bg-gradient-to-r from-purple-700 to-blue-600 text-white font-semibold text-sm shadow-sm hover:opacity-95 transition"
      >
        Sign In
      </button>

      <div id="message" class="hidden mt-4 p-3 rounded-md text-sm"></div>
    </form>

  </div>

  
<script src="./login.js"></script>
</body>
</html>
